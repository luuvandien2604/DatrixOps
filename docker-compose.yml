services:
  postgres:
    image: postgres:16-alpine
    container_name: datrixops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: datrixops
      POSTGRES_PASSWORD: datrixops_secret
      POSTGRES_DB: datrixops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datrixops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
