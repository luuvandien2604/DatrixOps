
services:
  gateway:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      # Keep the existing public origin port. The gateway now owns it and
      # forwards WebSocket upgrades directly to the Backend.
      - "3000:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: datrixops
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: datrixops
    ports:
      # Administrative access remains local to the control-plane host.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://datrixops:secretpassword@db:5432/datrixops?sslmode=disable
      - PORT=8080
      - JWT_SECRET=super-secret-key-change-in-production
      - AGENT_VERSION=${AGENT_VERSION:-1.4.3}
    ports:
      # Public API traffic must enter through the WebSocket-aware gateway.
      - "127.0.0.1:8080:8080"
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/v1}
    restart: always
    depends_on:
      - backend
    expose:
      - "3000"
    volumes:
      - ./docs:/app/docs:ro
      # Agent releases are published after the frontend image is built.
      # Keep them runtime-mounted so a release is downloadable before the
      # backend advertises its AGENT_VERSION.
      - ./frontend/public:/app/public:ro
    # To make this work properly across networks, you might need to rebuild 
    # the frontend with the correct NEXT_PUBLIC_API_URL pointing to your VPS IP if not using a reverse proxy.

volumes:
  pgdata:
