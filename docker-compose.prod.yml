
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: datrixops
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: datrixops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://datrixops:secretpassword@db:5432/datrixops?sslmode=disable
      - PORT=8080
      - JWT_SECRET=super-secret-key-change-in-production
      - AGENT_VERSION=${AGENT_VERSION:-1.2.0}
    ports:
      - "8080:8080"
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/v1}
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./docs:/app/docs:ro
    # To make this work properly across networks, you might need to rebuild 
    # the frontend with the correct NEXT_PUBLIC_API_URL pointing to your VPS IP if not using a reverse proxy.

volumes:
  pgdata:
